name: Auto Pricing Sync
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  run_sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install -r requirements.txt
      - env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: python pricing_engine.py
